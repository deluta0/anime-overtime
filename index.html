<head>
	<!-- Firebase App dan Layanan SDK via CDN -->
	<script type="module">
	  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
	  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
	  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

	  const firebaseConfig = {
		apiKey: "AIzaSyDPBl2zSSBq2ibHGXdczGU6G4XiFbaYDb0",
		authDomain: "animeovertime-e33bf.firebaseapp.com",
		projectId: "animeovertime-e33bf",
		storageBucket: "animeovertime-e33bf.firebasestorage.app",
		messagingSenderId: "154401930385",
		appId: "1:154401930385:web:654f19434020a863f51330",
		measurementId: "G-2BEP3VLZFB"
	  };

	  const app = initializeApp(firebaseConfig);
	  const auth = getAuth(app);
	  const db = getFirestore(app);

	  // Ekspos layanan Firebase ke window agar bisa diakses script biasa
	  window.authService = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, doc, setDoc, getDoc };

	  // Hubungkan Auth Firebase langsung ke Variabel Global Window
	  onAuthStateChanged(auth, async (user) => {
		  if (user) {
			  window.firebaseCurrentUserUid = user.uid;
			  window.currentUser = user.email.split('@')[0]; // Set ke variabel global utama
			  
			  // Ambil data dari Firestore Cloud
			  const docRef = doc(db, "users", user.uid);
			  const docSnap = await getDoc(docRef);
			  
			  if (docSnap.exists()) {
				  window.allUserCloudData = docSnap.data();
			  } else {
				  window.allUserCloudData = { watchlist: {}, watched: {} };
			  }
		  } else {
			  window.firebaseCurrentUserUid = null;
			  window.currentUser = null; // Reset total jika logout
			  window.allUserCloudData = { watchlist: {}, watched: {} };
		  }
		  
		  // Pemicu refresh UI setelah Firebase selesai memuat status akun
		  if (typeof updateAuthNavbar === "function") updateAuthNavbar();
		  if (typeof renderWatchlistUI === "function") renderWatchlistUI();
		  
		  // Jika modal detail sedang terbuka, perbarui tampilan tombol watchlist-nya
		  if (window.selectedAnimeId && typeof allFetchedAnimeMap !== "undefined") {
			  const activeAnime = allFetchedAnimeMap.get(window.selectedAnimeId);
			  if (activeAnime && typeof updateWatchlistBtnStyle === "function") {
				  updateWatchlistBtnStyle(activeAnime);
			  }
		  }
	  });
	</script>

	<script>
		function updateAuthNavbar() {
			const container = document.getElementById('authNavContainer');
			if (window.currentUser) { 
				container.innerHTML = `
					<span class="text-xs text-gray-400 mr-1">Halo, <b class="text-indigo-400">${window.currentUser}</b></span>
					<button onclick="handleLogout()" class="bg-red-950/50 hover:bg-red-900 border border-red-900/50 text-red-400 text-xs px-2.5 py-1.5 rounded-lg transition font-medium cursor-pointer">Keluar</button>
				`;
			} else {
				container.innerHTML = `
					<button onclick="openAuthModal('login')" class="bg-gray-800 hover:bg-gray-700 text-white text-xs px-3 py-1.5 rounded-lg transition font-medium border border-gray-700 cursor-pointer">Masuk</button>
				`;
			}
		}

		async function handleLogout() {
			if (window.currentUser) {
				showToast(`Sampai jumpa, ${window.currentUser}!`, "info");
			}
			
			const { auth, signOut } = window.authService;
			try {
				await signOut(auth); 
				closeModal(); 
			} catch (error) {
				console.error("Gagal Logout:", error);
			}
		}
	</script>

    <!-- JAVASCRIPT & STATE MANAGEMENT -->
    <script>
        const ANILIST_URL = 'https://graphql.anilist.co';
        const animeGrid = document.getElementById('animeGrid');
        const watchlistGrid = document.getElementById('watchlistGrid');
        const watchlistSection = document.getElementById('watchlistSection');
        const sectionTitle = document.getElementById('sectionTitle');
        const loading = document.getElementById('loading');
        const seasonSelect = document.getElementById('seasonSelect');
        const yearSelect = document.getElementById('yearSelect');
        const sortSelect = document.getElementById('sortSelect');
        const settingsPanel = document.getElementById('settingsPanel');

        let currentAnimeData = [];
        let allFetchedAnimeMap = new Map();
        let currentTitlePref = localStorage.getItem('animeTitlePref') || 'english';
        let authMode = 'login';
        let selectedAnimeId = null;
        let countdownInterval = null;

        const seasonalAnimeQuery = `
        query ($season: MediaSeason, $seasonYear: Int, $sort: [MediaSort]) {
            Page(page: 1, perPage: 30) {
                media(season: $season, seasonYear: $seasonYear, type: ANIME, sort: $sort) {
                    id
                    title { romaji english }
                    coverImage { large }
                    averageScore
                    format
                    episodes
                    status
                    genres
                    description
                    trailer { id site }
                    nextAiringEpisode { airingAt timeUntilAiring episode }
                }
            }
        }`;

        window.onload = () => {
            generateYearOptions();
            initSettingsUI();
            updateAuthNavbar();
            checkSavedAccount();
            initSeasonal();
        };

        // --- SISTEM TOAST ENGINE ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `pointer-events-auto flex items-center p-4 bg-gray-900 border text-sm rounded-xl shadow-2xl transform transition duration-300 translate-y-2 opacity-0 border-gray-800`;
            const icon = type === 'success' ? '🟢' : type === 'error' ? '🔴' : '🔵';
            toast.innerHTML = `<span class="mr-3 text-base">${icon}</span><div class="font-medium text-gray-200">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-2', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // --- MANAJEMEN PENGATURAN INDIVIDUAL TOGGLE SAVE ACCOUNT ---
        function checkSavedAccount() {
            const savedUser = localStorage.getItem('savedAnimeUsername');
            const savedPass = localStorage.getItem('savedAnimePassword');
            
            if (savedUser) {
                document.getElementById('authUsername').value = savedUser;
                document.getElementById('toggleSaveUser').checked = true;
            }
            if (savedPass) {
                document.getElementById('authPassword').value = savedPass;
                document.getElementById('toggleSavePass').checked = true;
            }
        }

        function handleOutsideClick(event, modalId) {
            if (modalId === 'animeModal') closeModal();
            else if (modalId === 'authModal') closeAuthModal();
        }

        function openAuthModal(mode) {
            authMode = mode;
            document.getElementById('authModal').classList.remove('hidden');
            document.getElementById('authModal').classList.add('flex');
            switchAuthMode(mode);
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('flex');
            document.getElementById('authModal').classList.add('hidden');
        }

        function switchAuthMode(targetMode) {
            if (targetMode) authMode = targetMode;
            else authMode = authMode === 'login' ? 'register' : 'login';

            const title = document.getElementById('authModalTitle');
            const submitBtn = document.getElementById('authSubmitBtn');
            const switchText = document.getElementById('authSwitchText');
            const switchBtn = document.getElementById('authSwitchBtn');
            
            const toggleUser = document.getElementById('toggleUserContainer');
            const togglePass = document.getElementById('togglePassContainer');

            if (authMode === 'login') {
                title.innerText = "Masuk Akun"; submitBtn.innerText = "Masuk";
                switchText.innerText = "Belum punya akun?"; switchBtn.innerText = "Daftar Sekarang";
                toggleUser.classList.remove('hidden');
                togglePass.classList.remove('hidden');
                checkSavedAccount();
            } else {
                title.innerText = "Daftar Akun Baru"; submitBtn.innerText = "Buat Akun";
                switchText.innerText = "Sudah punya akun?"; switchBtn.innerText = "Masuk di sini";
                toggleUser.classList.add('hidden');
                togglePass.classList.add('hidden');
            }
        }

        async function handleAuthSubmit(e) {
			e.preventDefault();
			
			const usernameInput = document.getElementById('authUsername').value.trim();
			const pass = document.getElementById('authPassword').value;
			const emailFormat = `${usernameInput}@animeovertime.com`;
			
			const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.authService;
			const saveUserChecked = document.getElementById('toggleSaveUser').checked;
			const savePassChecked = document.getElementById('toggleSavePass').checked;

			try {
				if (authMode === 'register') {
					await createUserWithEmailAndPassword(auth, emailFormat, pass);
					showToast("Registrasi berhasil! Otomatis masuk.");
					closeAuthModal();
				} else {
					await signInWithEmailAndPassword(auth, emailFormat, pass);
					
					if (saveUserChecked) localStorage.setItem('savedAnimeUsername', usernameInput);
					else localStorage.removeItem('savedAnimeUsername');

					if (savePassChecked) localStorage.setItem('savedAnimePassword', pass);
					else localStorage.removeItem('savedAnimePassword');

					showToast(`Selamat datang kembali, ${usernameInput}!`, "success");
					closeAuthModal();
				}
				
				document.getElementById('authForm').reset();
				
			} catch (error) {
				console.error("Firebase Auth Error:", error);
				
				let friendlyMessage = "Gagal masuk/daftar.";
				if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
					friendlyMessage = "Username atau password salah!";
				} else if (error.code === 'auth/email-already-in-use') {
					friendlyMessage = "Username sudah terpakai!";
				} else if (error.code === 'auth/weak-password') {
					friendlyMessage = "Password terlalu lemah (minimal 6 karakter).";
				} else {
					friendlyMessage = error.message;
				}
				
				showToast(friendlyMessage, "error");
			}
		}

        function getWatchlistKey() { return `${seasonSelect.value}-${yearSelect.value}`; }

        function renderWatchlistUI() {
            watchlistGrid.innerHTML = '';
            if (!window.currentUser) { watchlistSection.classList.add('hidden'); return; }

            const userWatchlist = window.allUserCloudData?.watchlist?.[getWatchlistKey()] || [];

            if (userWatchlist.length === 0) { watchlistSection.classList.add('hidden'); return; }

            watchlistSection.classList.remove('hidden');
            document.getElementById('watchlistCount').innerText = userWatchlist.length;

            userWatchlist.forEach(animeId => {
                const anime = allFetchedAnimeMap.get(animeId);
                if (!anime) return;

                const card = document.createElement('div');
                card.className = "bg-gray-900 border border-emerald-950 rounded-xl overflow-hidden hover:border-emerald-500 transition duration-300 cursor-pointer group flex flex-col justify-between shadow-lg";
                const score = anime.averageScore ? `⭐ ${anime.averageScore}%` : '⭐ N/A';
                const title = getAnimeTitle(anime);

                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-[3/4]">
                        <img class="w-full h-full object-cover group-hover:scale-105 transition duration-300" src="${anime.coverImage.large}" alt="${title}" loading="lazy">
                        <div class="absolute top-2 left-2 bg-emerald-950/90 text-emerald-400 px-2 py-0.5 rounded text-[10px] font-black border border-emerald-800">Watchlist</div>
                        <div class="absolute bottom-2 left-2 bg-black/70 px-2 py-0.5 rounded text-xs text-yellow-400 font-bold">${score}</div>
                    </div>
                    <div class="p-3 sm:p-4 flex-1 flex flex-col justify-between">
                        <h4 class="font-bold text-xs sm:text-sm text-gray-200 line-clamp-2 group-hover:text-emerald-400 transition">${title}</h4>
                        <p class="text-[10px] sm:text-xs text-gray-500 mt-1">${anime.format || 'TV'} (${anime.episodes || '?'} Eps)</p>
                    </div>
                `;
                card.onclick = () => openModal(anime);
                watchlistGrid.appendChild(card);
            });
        }

        async function toggleWatchlist(anime) {
            if (!window.currentUser) { openAuthModal('login'); return; }
			
			const { db, doc, setDoc } = window.authService;
			const key = getWatchlistKey();
			
			let userWatchlist = window.allUserCloudData?.watchlist?.[key] || [];
			const index = userWatchlist.indexOf(anime.id);

			if (index > -1) {
				userWatchlist.splice(index, 1);
				showToast("Dihapus dari Watchlist");
			} else {
				userWatchlist.push(anime.id);
				showToast("Ditambahkan ke Watchlist");
			}

			if (!window.allUserCloudData) window.allUserCloudData = {};
			if (!window.allUserCloudData.watchlist) window.allUserCloudData.watchlist = {};
			window.allUserCloudData.watchlist[key] = userWatchlist;

			const userDocRef = doc(db, "users", window.firebaseCurrentUserUid);
			await setDoc(userDocRef, {
				watchlist: { [key]: userWatchlist }
			}, { merge: true });

            updateWatchlistBtnStyle(anime);
			renderWatchlistUI();
		}

        function renderEpisodeTracker(anime) {
            const container = document.getElementById('episodeTrackerContainer');
            container.innerHTML = '';
            const totalEpisodes = anime.episodes || 12;
            let userWatchedData = {};
            if (window.currentUser) {
                userWatchedData = window.allUserCloudData?.watched?.[anime.id] || {};
            }

            for (let i = 1; i <= totalEpisodes; i++) {
                const btn = document.createElement('button');
                const isWatched = userWatchedData[i] === true;
                btn.innerText = `Eps ${i}`;
                
                if (isWatched && window.currentUser) btn.className = "bg-green-600 hover:bg-green-700 text-white text-[10px] sm:text-xs font-bold py-2 rounded border border-green-500 shadow-sm transition cursor-pointer";
                else btn.className = "bg-gray-800 hover:bg-gray-700 text-gray-300 text-[10px] sm:text-xs py-2 rounded border border-gray-700 transition cursor-pointer";

                btn.onclick = () => {
                    if (!window.currentUser) { openAuthModal('login'); return; }
                    toggleEpisodeWatched(anime.id, i, isWatched, anime);
                };
                container.appendChild(btn);
            }
        }

        async function toggleEpisodeWatched(animeId, episodeNum, currentStatus, anime) {
            const { db, doc, setDoc } = window.authService;
            if (!window.allUserCloudData) window.allUserCloudData = {};
            if (!window.allUserCloudData.watched) window.allUserCloudData.watched = {};
            if (!window.allUserCloudData.watched[animeId]) window.allUserCloudData.watched[animeId] = {};
            
            window.allUserCloudData.watched[animeId][episodeNum] = !currentStatus;
            
            if(!currentStatus) showToast(`Tandai Episode ${episodeNum} ditonton`);
            else showToast(`Batal tandai Episode ${episodeNum}`);

            const userDocRef = doc(db, "users", window.firebaseCurrentUserUid);
			await setDoc(userDocRef, {
				watched: { [animeId]: { [episodeNum]: !currentStatus } }
			}, { merge: true });

            renderEpisodeTracker(anime);
        }

        function updateWatchlistBtnStyle(anime) {
            const btn = document.getElementById('modalWatchlistBtn');
            if (!window.currentUser) {
                btn.innerText = "+ Watchlist";
                btn.className = "shrink-0 text-[10px] sm:text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-2.5 py-1.5 rounded-lg border border-gray-700 font-semibold cursor-pointer";
                return;
            }
            const list = window.allUserCloudData?.watchlist?.[getWatchlistKey()] || [];
            if (list.includes(anime.id)) {
                btn.innerHTML = "✓ Saved";
                btn.className = "shrink-0 text-[10px] sm:text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-2.5 py-1.5 rounded-lg border border-emerald-500 font-bold cursor-pointer shadow-md";
            } else {
                btn.innerText = "+ Watchlist";
                btn.className = "shrink-0 text-[10px] sm:text-xs bg-gray-850 hover:bg-gray-800 text-gray-300 px-2.5 py-1.5 rounded-lg border border-gray-700 font-semibold cursor-pointer";
            }
        }

        function startCountdown(airingAt, timeUntilAiring, episode) {
            if (countdownInterval) clearInterval(countdownInterval);
            const scheduleCard = document.getElementById('airingScheduleCard');
            const timeInfo = document.getElementById('airingTimeInfo');
            const countdownText = document.getElementById('airingCountdown');

            const date = new Date(airingAt * 1000);
            const opsiHari = { weekday: 'long', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' };
            timeInfo.innerText = `Eps ${episode}: ${date.toLocaleDateString('id-ID', opsiHari)}`;
            scheduleCard.classList.remove('hidden');

            let sisaDetik = timeUntilAiring;
            function updateTimer() {
                if (sisaDetik <= 0) {
                    countdownText.innerText = "⏳ Sedang tayang / Baru saja rilis!";
                    clearInterval(countdownInterval); return;
                }
                const hari = Math.floor(sisaDetik / (3600 * 24));
                const jam = Math.floor((sisaDetik % (3600 * 24)) / 3600);
                const menit = Math.floor((sisaDetik % 3600) / 60);
                const detik = sisaDetik % 60;
                countdownText.innerText = `⏱️ Rilis dalam: ${hari}h ${jam}j ${menit}m ${detik}s`;
                sisaDetik--;
            }
            updateTimer(); countdownInterval = setInterval(updateTimer, 1000);
        }

        function initSettingsUI() {
            const radio = document.querySelector(`input[name="titlePref"][value="${currentTitlePref}"]`);
            if (radio) radio.checked = true;
        }
        function toggleSettingsMenu() { settingsPanel.classList.toggle('hidden'); }
        function changeTitlePreference(pref) {
            currentTitlePref = pref; localStorage.setItem('animeTitlePref', pref);
            displayAnime(currentAnimeData); renderWatchlistUI();
        }
        
        function generateYearOptions() {
            const currentYear = new Date().getFullYear();
            yearSelect.innerHTML = '';
            for (let i = currentYear + 1; i >= currentYear - 5; i--) {
                const option = document.createElement('option');
                option.value = i; option.innerText = i;
                if (i === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        }
        
        function initSeasonal() {
            const currentMonth = new Date().getMonth(); const currentYear = new Date().getFullYear();
            let currentSeason = 'WINTER';
            if (currentMonth >= 2 && currentMonth <= 4) currentSeason = 'SPRING';
            else if (currentMonth >= 5 && currentMonth <= 7) currentSeason = 'SUMMER';
            else if (currentMonth >= 8 && currentMonth <= 10) currentSeason = 'FALL';
            seasonSelect.value = currentSeason; yearSelect.value = currentYear; sortSelect.value = 'AIRING_AT';
            loadSeasonalData(currentSeason, currentYear, 'AIRING_AT');
        }

        function applyFilters() { loadSeasonalData(seasonSelect.value, parseInt(yearSelect.value), sortSelect.value); }
        function loadSeasonalData(season, year, sortBy) {
            const readableSeason = seasonSelect.options[seasonSelect.selectedIndex].text.split(' ')[0];
            const readableSort = sortSelect.options[sortSelect.selectedIndex].text;
            sectionTitle.innerText = `Anime Musim: ${readableSeason} ${year} (${readableSort})`;
            fetchAniList(seasonalAnimeQuery, { season: season, seasonYear: year, sort: [sortBy] });
        }

        async function fetchAniList(query, variables) {
            loading.classList.remove('hidden'); loading.classList.add('flex');
            animeGrid.innerHTML = '';
            let isAiringSort = false;
            if (variables.sort && variables.sort[0] === 'AIRING_AT') {
                variables.sort = ['POPULARITY_DESC']; isAiringSort = true;
            }
            try {
                const response = await fetch(ANILIST_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: query, variables: variables })
                });
                const result = await response.json();
                currentAnimeData = result.data.Page.media;
                currentAnimeData.forEach(anime => allFetchedAnimeMap.set(anime.id, anime));

                if (isAiringSort) {
                    currentAnimeData.sort((a, b) => {
                        const timeA = a.nextAiringEpisode ? a.nextAiringEpisode.timeUntilAiring : Infinity;
                        const timeB = b.nextAiringEpisode ? b.nextAiringEpisode.timeUntilAiring : Infinity;
                        return timeA - timeB;
                    });
                }
                displayAnime(currentAnimeData); renderWatchlistUI();
            } catch (error) {
                console.error(error);
                animeGrid.innerHTML = `<p class="text-red-500 col-span-full text-center">Gagal memuat data.</p>`;
            } finally { 
                loading.classList.remove('flex'); loading.classList.add('hidden'); 
            }
        }
        function getAnimeTitle(anime) { return currentTitlePref === 'english' ? (anime.title.english || anime.title.romaji) : (anime.title.romaji || anime.title.english); }

        function displayAnime(animeList) {
            animeGrid.innerHTML = ''; if (!animeList || animeList.length === 0) return;
            animeList.forEach(anime => {
                const card = document.createElement('div');
                card.className = "bg-gray-900 border border-gray-800 rounded-xl overflow-hidden hover:border-indigo-500 transition duration-300 cursor-pointer group flex flex-col justify-between";
                const score = anime.averageScore ? `⭐ ${anime.averageScore}%` : '⭐ N/A';
                const title = getAnimeTitle(anime);
                const airingBadge = anime.nextAiringEpisode ? `<div class="absolute bottom-2 right-2 bg-indigo-600 text-white px-2 py-0.5 rounded text-[10px] font-black tracking-wide">EPS ${anime.nextAiringEpisode.episode}</div>` : '';
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-[3/4]">
                        <img class="w-full h-full object-cover group-hover:scale-105 transition duration-300" src="${anime.coverImage.large}" alt="${title}" loading="lazy">
                        <div class="absolute top-2 left-2 bg-black/70 px-2 py-0.5 rounded text-xs text-yellow-400 font-bold">${score}</div>
                        ${airingBadge}
                    </div>
                    <div class="p-3 sm:p-4 flex-1 flex flex-col justify-between">
                        <h4 class="font-bold text-xs sm:text-sm text-gray-200 line-clamp-2 group-hover:text-indigo-400 transition">${title}</h4>
                        <p class="text-[10px] sm:text-xs text-gray-500 mt-1">${anime.format || 'TV'} (${anime.episodes || '?'} Eps)</p>
                    </div>
                `;
                card.onclick = () => openModal(anime); animeGrid.appendChild(card);
            });
        }

        function openModal(anime) {
            selectedAnimeId = anime.id; const mainTitle = getAnimeTitle(anime);
            document.getElementById('modalTitle').innerText = mainTitle;
            document.getElementById('modalSubTitle').innerText = anime.title.romaji !== mainTitle ? anime.title.romaji : '';
            document.getElementById('modalImg').src = anime.coverImage.large;
            document.getElementById('modalRating').innerText = anime.averageScore ? `⭐ ${anime.averageScore}%` : '⭐ N/A';
            document.getElementById('modalType').innerText = `📺 ${anime.format || 'TV'}`;
            document.getElementById('modalEpisodes').innerText = `⏳ ${anime.episodes || '?'} Episode`;
            
            updateWatchlistBtnStyle(anime);
            document.getElementById('modalWatchlistBtn').onclick = () => toggleWatchlist(anime);
            document.getElementById('airingScheduleCard').classList.add('hidden');
            if (anime.nextAiringEpisode) startCountdown(anime.nextAiringEpisode.airingAt, anime.nextAiringEpisode.timeUntilAiring, anime.nextAiringEpisode.episode);

            renderEpisodeTracker(anime);
            const statusBadge = document.getElementById('modalStatus');
            statusBadge.innerText = anime.status;
            statusBadge.className = `px-2 py-0.5 rounded text-[10px] font-bold ${anime.status === 'FINISHED' ? 'bg-green-900/50 text-green-400' : 'bg-blue-900/50 text-blue-400'}`;

            const genreContainer = document.getElementById('modalGenres'); genreContainer.innerHTML = '';
            anime.genres.slice(0, 3).forEach(genre => {
                genreContainer.innerHTML += `<span class="text-[10px] bg-indigo-950/60 text-indigo-400 border border-indigo-900/50 px-2 py-0.5 rounded-full">${genre}</span>`;
            });
            document.getElementById('modalSynopsis').innerText = anime.description ? anime.description.replace(/<\/?[^>]+(>|$)/g, "") : 'Sinopsis tidak tersedia.';
            
            const watchBtn = document.getElementById('watchBtn');
            if (anime.trailer && anime.trailer.site === 'youtube' && anime.trailer.id) {
                watchBtn.href = `https://www.youtube.com/watch?v=${anime.trailer.id}`;
                watchBtn.innerText = "Tonton PV / Trailer Resmi di YouTube";
            } else {
                watchBtn.href = `https://www.youtube.com/results?search_query=${encodeURIComponent(mainTitle + ' trailer')}`;
                watchBtn.innerText = "Cari Trailer di YouTube";
            }
            const modal = document.getElementById('animeModal'); modal.classList.remove('hidden'); modal.classList.add('flex');
        }

        function closeModal() {
            if (countdownInterval) clearInterval(countdownInterval);
            selectedAnimeId = null; const modal = document.getElementById('animeModal');
            modal.classList.remove('flex'); modal.classList.add('hidden');
        }
    </script>
</body>
